[pytest]
testpaths = tests
pythonpath = src
addopts = -v

# Custom markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    e2e: marks tests as end-to-end integration tests (deselect with '-m "not e2e"')
    ocr: marks tests that run actual OCR engines (deselect with '-m "not ocr"')
